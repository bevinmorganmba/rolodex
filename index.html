// ─── Utils ───
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36);
const daysSince=d=>{if(!d)return Infinity;return Math.floor((new Date()-new Date(d))/864e5)};
const fmtDate=d=>d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
const todayStr=()=>new Date().toISOString().split('T')[0];
const urgency=(days,th)=>{
  if(days===Infinity)return{bg:'#1e1e1e',fg:'#555',label:'Never'};
  const r=days/th;
  if(r<.5)return{bg:'#0a2e1a',fg:'#34d399',label:days+'d ago'};
  if(r<.8)return{bg:'#2e2a0a',fg:'#fbbf24',label:days+'d ago'};
  if(r<1)return{bg:'#2e1a0a',fg:'#f97316',label:days+'d ago'};
  return{bg:'#2e0a0a',fg:'#ef4444',label:days+'d overdue'};
};

];

// ─── CSV ───
function parseCSV(text){
  const lines=[];let cur='',inQ=false;
  for(let i=0;i<text.length;i++){const ch=text[i];if(ch==='"'){inQ=!inQ;continue}if(ch==='\n'&&!inQ){lines.push(cur);cur='';continue}if(ch==='\r'&&!inQ)continue;cur+=ch}
  if(cur.trim())lines.push(cur);
  return lines.map(line=>{const fields=[];let f='',q=false;for(let i=0;i<line.length;i++){if(line[i]==='"'){q=!q;continue}if(line[i]===','&&!q){fields.push(f.trim());f='';continue}f+=line[i]}fields.push(f.trim());return fields});
}
function mapGoogle(headers,row){
  // Exact match first, then substring match
  const getExact=name=>{const i=headers.findIndex(h=>h===name);return(i>=0&&row[i])?row[i].trim():''};
  const get=names=>{for(const n of names){const v=getExact(n);if(v)return v}for(const n of names){const i=headers.findIndex(h=>h.toLowerCase().includes(n.toLowerCase()));if(i>=0&&row[i])return row[i].trim()}return''};
  // Collect ALL emails (Google exports E-mail 1 - Value, E-mail 2 - Value, etc.)
  const getAllOf=(prefix,valSuffix)=>{const results=[];for(let n=1;n<=5;n++){const v=getExact(`${prefix} ${n} - ${valSuffix}`);if(v)results.push(v)}return results};
  const first=get(['Given Name','First Name','first name']);
  const last=get(['Family Name','Last Name','last name','Additional Name']);
  if(!first&&!last)return null;
  // Emails: try Google format first, then generic
  const emails=getAllOf('E-mail','Value');
  const email=emails[0]||get(['Email','email','E-mail Address','E-mail 1 - Value','Email Address']);
  // Phones: Google uses "Phone 1 - Value", also try generic
  const phones=getAllOf('Phone','Value');
  const phone=phones[0]||get(['Phone','phone','Mobile Phone','Mobile','Phone Number','Primary Phone']);
  // Organization
  const org=get(['Organization 1 - Name','Company','Organization','company']);
  const title=get(['Organization 1 - Title','Job Title','Title','title']);
  // Address
  const addr=get(['Address 1 - Formatted','Address','Home Address','address','Address 1 - Street']);
  // Birthday
  const bday=get(['Birthday','birthday']);
  // Group labels (Google uses "* myContacts ::: Label1 ::: Label2")
  const groupRaw=get(['Group Membership','Groups','group','Labels']);
  const tags=groupRaw?groupRaw.split(':::').map(g=>g.trim().replace(/^\* /,'')).filter(g=>g&&g!=='myContacts'&&g!=='* myContacts'):[];
  // Notes
  const notes=get(['Notes','note','Note']);
  // Nickname
  const nickname=get(['Nickname','nick','Short Name']);
  // Build notes with org/title/address/extra emails/phones if present
  const extraParts=[];
  if(org)extraParts.push('Company: '+org);
  if(title)extraParts.push('Title: '+title);
  if(addr)extraParts.push('Address: '+addr);
  if(bday)extraParts.push('Birthday: '+bday);
  if(emails.length>1)extraParts.push('Other emails: '+emails.slice(1).join(', '));
  if(phones.length>1)extraParts.push('Other phones: '+phones.slice(1).join(', '));
  const fullNotes=[notes,...extraParts].filter(Boolean).join('\n');
  // Custom fields for org and birthday
  const customFields={};
  if(org)customFields['Company']=org;
  if(title)customFields['Title']=title;
  if(bday)customFields['Birthday']=bday;
  if(addr)customFields['Address']=addr;
  return{id:uid(),firstName:first||last,lastName:first?last:'',nickname,dateMet:'',locationMet:'',mutualAssociates:'',lastContact:'',email,phone,instagram:'',category:tags.some(t=>t.toLowerCase().includes('business')||t.toLowerCase().includes('work'))?'business':'personal',notes:fullNotes,tags,customFields};
}
function toCSV(contacts){
  const h=['First Name','Last Name','Nickname','Category','Date Met','Location Met','Mutual Associates','Last Contact','Email','Phone','Instagram','Tags','Company','Title','Birthday','Address','Notes'];
  const rows=contacts.map(c=>[c.firstName,c.lastName,c.nickname,c.category,c.dateMet,c.locationMet,c.mutualAssociates,c.lastContact,c.email,c.phone,c.instagram,(c.tags||[]).join('; '),c.customFields?.Company||'',c.customFields?.Title||'',c.customFields?.Birthday||'',c.customFields?.Address||'',c.notes].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  return[h.join(','),...rows].join('\n');
}

// ─── TagPicker ───
function TagPicker({selected=[],allTags=[],onChange,onAddTag}){
  const[adding,setAdding]=useState(false);
  const[nt,setNt]=useState('');
  const toggle=t=>onChange(selected.includes(t)?selected.filter(x=>x!==t):[...selected,t]);
  return <div>
    <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'8px'}}>
      {allTags.map(t=><button key={t} onClick={()=>toggle(t)} style={{padding:'4px 12px',borderRadius:'20px',fontSize:'11px',fontWeight:'600',cursor:'pointer',border:selected.includes(t)?'1px solid #c7956d':'1px solid #2a2a2a',background:selected.includes(t)?'#1a1510':'transparent',color:selected.includes(t)?'#c7956d':'#666',fontFamily:"'Libre Franklin',sans-serif"}}>{t}</button>)}
      {!adding&&<button onClick={()=>setAdding(true)} style={{padding:'4px 10px',borderRadius:'20px',fontSize:'11px',border:'1px dashed #333',background:'transparent',color:'#555',cursor:'pointer'}}>+ New</button>}
    </div>
    {adding&&<div style={{display:'flex',gap:'6px'}}>
      <input style={{...S.input,flex:1,padding:'6px 10px',fontSize:'12px'}} placeholder="Tag name" value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&nt.trim()){onAddTag(nt.trim());toggle(nt.trim());setNt('');setAdding(false)}}} autoFocus/>
      <button onClick={()=>{if(nt.trim()){onAddTag(nt.trim());toggle(nt.trim());setNt('');setAdding(false)}}} style={{...S.btn('#c7956d','#0d0d0d'),padding:'6px 12px',fontSize:'11px'}}>Add</button>
      <button onClick={()=>{setAdding(false);setNt('')}} style={{...S.ghost,padding:'6px 10px',fontSize:'11px'}}>Cancel</button>
    </div>}
  </div>;
}

// ─── ContactForm ───
function ContactForm({contact,allTags,customFieldDefs,onSave,onCancel,onAddTag,onAddField}){
  const[f,setF]=useState(contact||{id:uid(),firstName:'',lastName:'',nickname:'',dateMet:'',locationMet:'',mutualAssociates:'',lastContact:'',email:'',phone:'',instagram:'',category:'personal',notes:'',tags:[],customFields:{}});
  const[af,setAf]=useState(false);const[nf,setNf]=useState('');
  const set=k=>e=>setF({...f,[k]:e.target.value});
  const setCF=k=>e=>setF({...f,customFields:{...f.customFields,[k]:e.target.value}});
  const fg={marginBottom:'14px'};
  return <div style={{animation:'fadeIn 0.2s ease'}}>
    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
      <button onClick={onCancel} style={{background:'none',border:'none',color:'#7a7a7a',cursor:'pointer',padding:'4px'}}><I.Back/></button>
      <h2 style={{margin:0,fontSize:'18px',fontWeight:'600',color:'#e8e0d4',fontFamily:"'Cormorant Garamond',serif"}}>{contact?'Edit Contact':'New Contact'}</h2>
    </div>
    <div style={S.row}><div style={fg}><label style={S.label}>First Name *</label><input style={S.input} value={f.firstName} onChange={set('firstName')} placeholder="First"/></div><div style={fg}><label style={S.label}>Last Name</label><input style={S.input} value={f.lastName} onChange={set('lastName')} placeholder="Last"/></div></div>
    <div style={S.row}><div style={fg}><label style={S.label}>Nickname</label><input style={S.input} value={f.nickname} onChange={set('nickname')} placeholder="How you know them"/></div><div style={fg}><label style={S.label}>Category</label><select style={{...S.input,appearance:'none',cursor:'pointer'}} value={f.category} onChange={set('category')}><option value="personal">Personal</option><option value="business">Business</option><option value="dig-the-well">Dig the Well</option></select></div></div>
    <div style={S.row}><div style={fg}><label style={S.label}>Date Met</label><input style={S.input} type="date" value={f.dateMet} onChange={set('dateMet')}/></div><div style={fg}><label style={S.label}>Location Met</label><input style={S.input} value={f.locationMet} onChange={set('locationMet')} placeholder="Where you met"/></div></div>
    <div style={fg}><label style={S.label}>Mutual Associates</label><input style={S.input} value={f.mutualAssociates} onChange={set('mutualAssociates')} placeholder="Comma-separated names"/></div>
    <div style={fg}><label style={S.label}>Last Contact</label><input style={S.input} type="date" value={f.lastContact} onChange={set('lastContact')}/></div>
    <div style={S.row}><div style={fg}><label style={S.label}>Email</label><input style={S.input} type="email" value={f.email} onChange={set('email')} placeholder="email@example.com"/></div><div style={fg}><label style={S.label}>Phone</label><input style={S.input} type="tel" value={f.phone} onChange={set('phone')} placeholder="+1 (555) 000-0000"/></div></div>

// ─── DailyDigest ───
function DailyDigest({contacts,settings,onSelect}){

      <h2 style={{margin:0,fontSize:'22px',fontWeight:'600',color:'#e8e0d4',fontFamily:"'Cormorant Garamond',serif"}}>Today's Outreach</h2>
      <p style={{margin:'4px 0 0',fontSize:'12px',color:'#666'}}>Your top {settings.digestCount} reconnections</p>

    <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'24px'}}>{overdue.map((c,i)=>{const d=daysSince(c.lastContact);const u=urgency(d,settings.reachOutDays);return <div key={c.id} onClick={()=>onSelect(c)} style={{...S.card,cursor:'pointer',display:'flex',alignItems:'center',gap:'12px'}}><div style={{width:'32px',height:'32px',borderRadius:'50%',background:`linear-gradient(135deg,${u.fg}33,${u.fg}11)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:'700',color:u.fg,flexShrink:0}}>{i+1}</div><div style={{flex:1}}><div style={{fontSize:'14px',fontWeight:'600',color:'#e8e0d4'}}>{c.firstName} {c.lastName}</div><div style={{fontSize:'11px',color:'#666',marginTop:'1px'}}>{c.category==='dig-the-well'&&<span style={{color:'#d8b4fe'}}>★ </span>}{u.label}</div></div><span style={{color:u.fg,fontSize:'11px',fontWeight:'700'}}>{d}d</span></div>})}</div>}
    {dtw.length>0&&<React.Fragment><div style={{fontSize:'10px',fontWeight:'600',letterSpacing:'0.1em',textTransform:'uppercase',color:'#d8b4fe',marginBottom:'10px'}}>★ Dig the Well Priority</div><div style={{display:'flex',flexDirection:'column',gap:'6px'}}>{dtw.filter(c=>!overdue.find(o=>o.id===c.id)).slice(0,3).map(c=><div key={c.id} onClick={()=>onSelect(c)} style={{...S.card,cursor:'pointer',display:'flex',alignItems:'center',gap:'10px',background:'#12101a',borderColor:'#1e1a2e'}}><div style={{fontSize:'13px',fontWeight:'600',color:'#e8e0d4'}}>{c.firstName} {c.lastName}</div><div style={{fontSize:'11px',color:'#666',marginLeft:'auto'}}>{daysSince(c.lastContact)}d ago</div></div>)}</div></React.Fragment>}
  </div>;
}

// ─── ImportPanel ───
function ImportPanel({onImport,onCancel}){
  const[preview,setPreview]=useState(null);const[selected,setSelected]=useState(new Set());const[fn,setFn]=useState('');const ref=useRef();
  const handleFile=e=>{const file=e.target.files[0];if(!file)return;setFn(file.name);const reader=new FileReader();reader.onload=ev=>{const rows=parseCSV(ev.target.result);if(rows.length<2)return;const h=rows[0];const cs=rows.slice(1).map(r=>mapGoogle(h,r)).filter(Boolean);setPreview(cs);setSelected(new Set(cs.map(c=>c.id)))};reader.readAsText(file)};

      <div style={{...S.card,borderColor:'#1a2818'}}><div style={{fontSize:'10px',fontWeight:'700',letterSpacing:'0.1em',textTransform:'uppercase',color:'#34d399',marginBottom:'8px'}}>How to export your contacts</div><div style={{fontSize:'10px',fontWeight:'600',color:'#c7956d',marginTop:'10px',marginBottom:'4px'}}>From Google</div><ol style={{margin:0,paddingLeft:'18px',fontSize:'12px',color:'#888',lineHeight:'1.8'}}><li>Go to contacts.google.com</li><li>Select contacts (or "All")</li><li>Click Export → Google CSV</li><li>Upload the file here</li></ol><div style={{fontSize:'10px',fontWeight:'600',color:'#c7956d',marginTop:'10px',marginBottom:'4px'}}>From iPhone / iCloud</div><ol style={{margin:0,paddingLeft:'18px',fontSize:'12px',color:'#888',lineHeight:'1.8'}}><li>Go to icloud.com/contacts on a computer</li><li>Select All → Settings gear → Export vCard</li><li>Go to contacts.google.com → Import the vCard</li><li>Then Export as Google CSV</li><li>Upload that CSV here</li></ol><div style={{fontSize:'11px',color:'#555',marginTop:'8px',fontStyle:'italic'}}>Pulls: name, email, phone, company, title, birthday, address, notes, and Google labels as tags</div></div>
    </div>:<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}><div style={{fontSize:'13px',color:'#888'}}>{fn} · <span style={{color:'#e8e0d4'}}>{preview.length}</span> found</div><button onClick={toggleAll} style={{...S.ghost,fontSize:'10px',padding:'4px 10px'}}>{selected.size===preview.length?'Deselect All':'Select All'}</button></div>

      <div style={{maxHeight:'320px',overflowY:'auto',marginBottom:'16px'}}>{preview.map(c=>{const bits=[c.email,c.phone,c.customFields?.Company,c.customFields?.Title].filter(Boolean);return<div key={c.id} onClick={()=>toggle(c.id)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 12px',borderRadius:'8px',background:selected.has(c.id)?'#141410':'#0d0d0d',border:selected.has(c.id)?'1px solid #2a2810':'1px solid #1a1a1a',marginBottom:'4px',cursor:'pointer'}}><div style={{width:'18px',height:'18px',borderRadius:'4px',border:selected.has(c.id)?'1px solid #c7956d':'1px solid #333',background:selected.has(c.id)?'#c7956d':'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:'#0d0d0d',flexShrink:0}}>{selected.has(c.id)&&<I.Check/>}</div><div style={{flex:1,minWidth:0}}><div style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{fontSize:'13px',fontWeight:'600',color:'#e8e0d4'}}>{c.firstName} {c.lastName}</span>{c.tags?.length>0&&<span style={{fontSize:'9px',color:'#666',background:'#1a1a1a',padding:'1px 6px',borderRadius:'8px'}}>{c.tags[0]}</span>}</div><div style={{fontSize:'11px',color:'#555',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{bits.length>0?bits.join(' · '):'No contact info'}</div></div></div>})}</div>

  const[confirmDelete,setConfirmDelete]=useState(false);

  const toggle=id=>{const s=new Set(selected);s.has(id)?s.delete(id):s.add(id);setSelected(s)};
  const toggleAll=()=>{if(selected.size===contacts.length)setSelected(new Set());else setSelected(new Set(contacts.map(c=>c.id)))};

  // Find duplicates by name or email
  const findDupes=()=>{
    const groups={};
    contacts.forEach(c=>{
      const nameKey=`${(c.firstName||'').toLowerCase().trim()} ${(c.lastName||'').toLowerCase().trim()}`.trim();
      const emailKey=(c.email||'').toLowerCase().trim();
      const key=emailKey||nameKey;
      if(!key)return;
      // Check both keys
      if(emailKey&&groups[emailKey]){groups[emailKey].push(c);return}
      if(nameKey&&groups[nameKey]){groups[nameKey].push(c);return}
      // Try to find existing group by either key
      let found=false;
      for(const gk in groups){
        const members=groups[gk];
        if(members.some(m=>{
          const mName=`${(m.firstName||'').toLowerCase().trim()} ${(m.lastName||'').toLowerCase().trim()}`.trim();
          const mEmail=(m.email||'').toLowerCase().trim();
          return(emailKey&&mEmail&&emailKey===mEmail)||(nameKey&&mName&&nameKey===mName);
        })){members.push(c);found=true;break}
      }
      if(!found)groups[key]=[c];
    });
    return Object.values(groups).filter(g=>g.length>1);
  };

  const dupes=findDupes();

  // Merge: keep all non-empty fields from both, prefer the one with more data
  const mergeContacts=(keep,remove)=>{
    const merged={...keep};
    Object.keys(remove).forEach(k=>{
      if(k==='id'||k==='customFields'||k==='tags')return;
      if(!merged[k]&&remove[k])merged[k]=remove[k];
    });
    // Merge tags
    const allT=new Set([...(keep.tags||[]),...(remove.tags||[])]);
    merged.tags=[...allT];
    // Merge custom fields
    merged.customFields={...(remove.customFields||{}),...(keep.customFields||{})};
    // Merge notes (combine if both have them)
    if(keep.notes&&remove.notes&&keep.notes!==remove.notes){
      merged.notes=keep.notes+'\n---\n'+remove.notes;
    }
    return merged;
  };

  const tabStyle=active=>({padding:'6px 14px',borderRadius:'20px',border:active?'1px solid #c7956d':'1px solid #222',background:active?'#1a1510':'transparent',color:active?'#c7956d':'#555',fontSize:'11px',fontWeight:'600',cursor:'pointer'});

  return <div style={{animation:'fadeIn 0.2s ease'}}>
    <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
      <button onClick={onBack} style={{background:'none',border:'none',color:'#7a7a7a',cursor:'pointer',padding:'4px'}}><I.Back/></button>
      <h2 style={{margin:0,fontSize:'18px',fontWeight:'600',color:'#e8e0d4',fontFamily:"'Cormorant Garamond',serif"}}>Manage Contacts</h2>
    </div>

    <div style={{display:'flex',gap:'6px',marginBottom:'16px'}}>
      <button onClick={()=>setTab('select')} style={tabStyle(tab==='select')}>Batch Select</button>
      <button onClick={()=>setTab('dupes')} style={tabStyle(tab==='dupes')}>Duplicates{dupes.length>0&&<span style={{color:'#ef4444',marginLeft:'4px'}}>({dupes.length})</span>}</button>
    </div>

    {tab==='select'&&<div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
        <div style={{fontSize:'12px',color:'#888'}}>{selected.size} of {contacts.length} selected</div>
        <button onClick={toggleAll} style={{...S.ghost,fontSize:'10px',padding:'4px 10px'}}>{selected.size===contacts.length?'Deselect All':'Select All'}</button>
      </div>
      <div style={{maxHeight:'360px',overflowY:'auto',marginBottom:'14px'}}>
        {contacts.map(c=><div key={c.id} onClick={()=>toggle(c.id)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 12px',borderRadius:'8px',background:selected.has(c.id)?'#1a1010':'#0d0d0d',border:selected.has(c.id)?'1px solid #3a1a1a':'1px solid #161616',marginBottom:'4px',cursor:'pointer'}}>
          <div style={{width:'18px',height:'18px',borderRadius:'4px',border:selected.has(c.id)?'1px solid #ef4444':'1px solid #333',background:selected.has(c.id)?'#ef4444':'transparent',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',flexShrink:0}}>{selected.has(c.id)&&<I.Check/>}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:'13px',fontWeight:'600',color:'#e8e0d4'}}>{c.firstName} {c.lastName}</div>
            <div style={{fontSize:'10px',color:'#555'}}>{c.email||c.phone||'No contact info'}</div>
          </div>
        </div>)}
      </div>
      {!confirmDelete?
        <button onClick={()=>{if(selected.size>0)setConfirmDelete(true)}} disabled={selected.size===0} style={{...S.btn(selected.size>0?'#ef4444':'#333',selected.size>0?'#fff':'#666'),width:'100%',justifyContent:'center',cursor:selected.size>0?'pointer':'not-allowed'}}>DELETE {selected.size} CONTACT{selected.size!==1?'S':''}</button>:
        <div style={{...S.card,borderColor:'#3a1a1a',textAlign:'center'}}>
          <div style={{fontSize:'13px',color:'#ef4444',fontWeight:'600',marginBottom:'8px'}}>Delete {selected.size} contact{selected.size!==1?'s':''}? This can't be undone.</div>
          <div style={{display:'flex',gap:'8px',justifyContent:'center'}}>
            <button onClick={()=>{onBatchDelete([...selected]);setSelected(new Set());setConfirmDelete(false)}} style={{...S.btn('#ef4444','#fff'),fontSize:'12px'}}>Yes, Delete</button>
            <button onClick={()=>setConfirmDelete(false)} style={{...S.ghost,fontSize:'12px'}}>Cancel</button>
          </div>
        </div>
      }
    </div>}

    {tab==='dupes'&&<div>
      {dupes.length===0?<div style={{...S.card,textAlign:'center',padding:'28px'}}><div style={{fontSize:'28px',marginBottom:'6px'}}>&#10024;</div><div style={{color:'#34d399',fontSize:'14px',fontWeight:'600'}}>No duplicates found</div><div style={{color:'#555',fontSize:'12px',marginTop:'4px'}}>Checked by matching name and email</div></div>:
      <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
        {dupes.map((group,gi)=>{
          const best=group.reduce((a,b)=>{const scoreA=Object.values(a).filter(v=>v&&v!=='personal').length;const scoreB=Object.values(b).filter(v=>v&&v!=='personal').length;return scoreA>=scoreB?a:b});
          return <div key={gi} style={{...S.card,borderColor:'#2e2a0a'}}>
            <div style={{fontSize:'10px',fontWeight:'600',letterSpacing:'0.08em',textTransform:'uppercase',color:'#fbbf24',marginBottom:'10px'}}>Possible duplicate ({group.length} contacts)</div>
            {group.map(c=>{const isBest=c.id===best.id;return <div key={c.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 10px',borderRadius:'8px',background:isBest?'#141410':'#0d0d0d',border:isBest?'1px solid #2a2810':'1px solid #1a1a1a',marginBottom:'4px'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{fontSize:'13px',fontWeight:'600',color:'#e8e0d4'}}>{c.firstName} {c.lastName}</span>{isBest&&<span style={{fontSize:'9px',color:'#34d399',background:'#0a2e1a',padding:'1px 6px',borderRadius:'8px'}}>most complete</span>}</div>
                <div style={{fontSize:'10px',color:'#555',marginTop:'2px'}}>{[c.email,c.phone,c.customFields?.Company].filter(Boolean).join(' · ')||'No contact info'}</div>
              </div>
            </div>})}
            <button onClick={()=>{const others=group.filter(c=>c.id!==best.id);const merged=others.reduce((acc,c)=>mergeContacts(acc,c),best);onMerge(merged,group.map(c=>c.id))}} style={{...S.btn('#2e2a0a','#fbbf24'),width:'100%',justifyContent:'center',marginTop:'8px',fontSize:'11px',border:'1px solid #4a4010'}}>Merge → Keep Best Data</button>
          </div>})}
      </div>}
    </div>}
  </div>;
}

// ═══════════════════════════════════
// ─── MAIN APP ───
// ═══════════════════════════════════
function App(){
  const[contacts,setContacts]=useState([]);
  const[settings,setSettings]=useState(DEFAULT_SETTINGS);
  const[allTags,setAllTags]=useState(DEFAULT_TAGS);
  const[cfd,setCfd]=useState([]);
  const[view,setView]=useState('list');
  const[active,setActive]=useState(null);
  const[search,setSearch]=useState('');
  const[filterCat,setFilterCat]=useState('all');
  const[filterTag,setFilterTag]=useState('');
  const[loaded,setLoaded]=useState(false);
  const[toast,setToast]=useState('');
  const show=msg=>{setToast(msg);setTimeout(()=>setToast(''),2500)};

  useEffect(()=>{
    try{const r=LS.get(SK.contacts);setContacts(JSON.parse(r.value))}catch{}
    try{const r=LS.get(SK.settings);setSettings(JSON.parse(r.value))}catch{}
    try{const r=LS.get(SK.tags);setAllTags(JSON.parse(r.value))}catch{}
    try{const r=LS.get(SK.fields);setCfd(JSON.parse(r.value))}catch{}
    setLoaded(true);
  },[]);

  useEffect(()=>{
    if(!loaded)return;
    LS.set(SK.contacts,JSON.stringify(contacts));
    LS.set(SK.settings,JSON.stringify(settings));
    LS.set(SK.tags,JSON.stringify(allTags));
    LS.set(SK.fields,JSON.stringify(cfd));
  },[contacts,settings,allTags,cfd,loaded]);

  const saveContact=c=>{setContacts(p=>{const ex=p.find(x=>x.id===c.id);return ex?p.map(x=>x.id===c.id?c:x):[...p,c]});show(contacts.find(x=>x.id===c.id)?'Updated':'Added');setView('list');setActive(null)};
  const del=id=>{setContacts(p=>p.filter(c=>c.id!==id));show('Removed');setView('list');setActive(null)};
  const markContacted=id=>{setContacts(p=>p.map(c=>c.id===id?{...c,lastContact:todayStr()}:c));show('Marked as contacted!');setView('list');setActive(null)};
  const doImport=imported=>{
    // Auto-register any custom field names from imported contacts
    const newFields=new Set(cfd);
    const newTags=new Set(allTags);
    imported.forEach(c=>{
      if(c.customFields)Object.keys(c.customFields).forEach(k=>{if(c.customFields[k])newFields.add(k)});
      if(c.tags)c.tags.forEach(t=>{if(t)newTags.add(t)});
    });
    setCfd([...newFields]);
    setAllTags([...newTags]);
    setContacts(p=>[...p,...imported]);
    show('Imported '+imported.length);setView('list');
  };
  const doExport=()=>{const csv=toCSV(contacts);const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='rolodex-export.csv';a.click();URL.revokeObjectURL(u);show('Exported!')};
  const addTag=t=>{if(!allTags.includes(t))setAllTags([...allTags,t])};
  const addField=f=>{if(!cfd.includes(f))setCfd([...cfd,f])};
  const deleteTag=t=>{setAllTags(prev=>prev.filter(x=>x!==t));setContacts(prev=>prev.map(c=>({...c,tags:(c.tags||[]).filter(x=>x!==t)})));if(filterTag===t)setFilterTag('');show('Tag "'+t+'" removed')};
  const deleteField=f=>{setCfd(prev=>prev.filter(x=>x!==f));setContacts(prev=>prev.map(c=>{const cf={...(c.customFields||{})};delete cf[f];return{...c,customFields:cf}}));show('Field "'+f+'" removed')};
  const batchDelete=ids=>{setContacts(prev=>prev.filter(c=>!ids.includes(c.id)));show('Deleted '+ids.length+' contacts')};
  const mergeContacts=(merged,allIds)=>{setContacts(prev=>{const without=prev.filter(c=>!allIds.includes(c.id));return[...without,merged]});show('Merged into '+merged.firstName+' '+merged.lastName)};

  const filtered=contacts.filter(c=>{
    const q=search.toLowerCase();
    const ms=!q||`${c.firstName} ${c.lastName} ${c.nickname} ${c.mutualAssociates} ${c.locationMet} ${c.notes} ${(c.tags||[]).join(' ')}`.toLowerCase().includes(q);
    const mc=filterCat==='all'||c.category===filterCat;
    const mt=!filterTag||(c.tags||[]).includes(filterTag);
    return ms&&mc&&mt;
  }).sort((a,b)=>{
    if(settings.sortBy==='name')return`${a.firstName}${a.lastName}`.localeCompare(`${b.firstName}${b.lastName}`);
    if(settings.sortBy==='recent')return daysSince(a.lastContact)-daysSince(b.lastContact);
    return daysSince(b.lastContact)-daysSince(a.lastContact);
  });

  const oc=contacts.filter(c=>daysSince(c.lastContact)>=settings.reachOutDays).length;

  if(!loaded)return <div style={{background:'#0a0a0a',minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#c7956d'}}>Loading...</div>;

  return <div style={{background:'#0a0a0a',minHeight:'100vh',color:'#e8e0d4',fontFamily:"'Libre Franklin',sans-serif",maxWidth:'560px',margin:'0 auto',padding:'20px',position:'relative'}}>
    {toast&&<div style={{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',background:'#1a1a1a',border:'1px solid #2a2a2a',borderRadius:'10px',padding:'10px 20px',fontSize:'12px',fontWeight:'600',color:'#c7956d',zIndex:100,animation:'toastIn 0.2s ease',boxShadow:'0 8px 32px rgba(0,0,0,.6)'}}>{toast}</div>}

    {view==='list'&&<div style={{animation:'fadeIn 0.2s ease'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'18px'}}>
        <div><h1 style={{margin:0,fontSize:'26px',fontWeight:'700',fontFamily:"'Cormorant Garamond',serif",letterSpacing:'-0.02em'}}>The Rolodex</h1><p style={{margin:'2px 0 0',fontSize:'11px',color:'#555'}}>{contacts.length} contacts · {oc>0?<span style={{color:'#ef4444'}}>{oc} need outreach</span>:<span style={{color:'#34d399'}}>all caught up</span>}</p></div>
        <div style={{display:'flex',gap:'6px'}}>
          <button onClick={()=>setView('digest')} style={{width:'34px',height:'34px',borderRadius:'50%',background:oc>0?'#2e0a0a':'#141414',border:oc>0?'1px solid #4a1a1a':'1px solid #2a2a2a',color:oc>0?'#ef4444':'#7a7a7a',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}><I.Calendar/>{oc>0&&<div style={{position:'absolute',top:'-2px',right:'-2px',width:'8px',height:'8px',borderRadius:'50%',background:'#ef4444'}}/>}</button>
          <button onClick={()=>setView('settings')} style={{width:'34px',height:'34px',borderRadius:'50%',background:'#141414',border:'1px solid #2a2a2a',color:'#7a7a7a',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I.Settings/></button>
          <button onClick={()=>{setActive(null);setView('add')}} style={{width:'34px',height:'34px',borderRadius:'50%',background:'#c7956d',border:'none',color:'#0d0d0d',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I.Plus/></button>
        </div>
      </div>

      <div style={{display:'flex',gap:'6px',marginBottom:'12px'}}>
        <button onClick={()=>setView('import')} style={{...S.ghost,fontSize:'10px',padding:'6px 10px'}}><I.Upload/> Import</button>
        <button onClick={doExport} disabled={!contacts.length} style={{...S.ghost,fontSize:'10px',padding:'6px 10px',opacity:contacts.length?1:.4}}><I.Download/> Export</button>
        <button onClick={()=>setView('manage')} disabled={!contacts.length} style={{...S.ghost,fontSize:'10px',padding:'6px 10px',opacity:contacts.length?1:.4}}><I.Edit/> Manage</button>
      </div>

      <div style={{position:'relative',marginBottom:'12px'}}><span style={{position:'absolute',left:'12px',top:'50%',transform:'translateY(-50%)',color:'#444'}}><I.Search/></span><input placeholder="Search contacts..." value={search} onChange={e=>setSearch(e.target.value)} style={{...S.input,paddingLeft:'34px',background:'#111',borderColor:'#1e1e1e'}}/></div>

      <div style={{display:'flex',gap:'5px',marginBottom:'10px',overflowX:'auto',paddingBottom:'2px'}}>
        {[{k:'all',l:'All'},{k:'personal',l:'Personal'},{k:'business',l:'Business'},{k:'dig-the-well',l:'Dig the Well'}].map(({k,l})=><button key={k} onClick={()=>setFilterCat(k)} style={{padding:'5px 12px',borderRadius:'20px',border:filterCat===k?'1px solid #c7956d':'1px solid #222',background:filterCat===k?'#1a1510':'transparent',color:filterCat===k?'#c7956d':'#555',fontSize:'10px',fontWeight:'600',cursor:'pointer',whiteSpace:'nowrap'}}>{l}</button>)}
      </div>

      {allTags.length>0&&<div style={{display:'flex',gap:'4px',marginBottom:'14px',overflowX:'auto',paddingBottom:'2px'}}>
        {filterTag&&<button onClick={()=>setFilterTag('')} style={{padding:'3px 8px',borderRadius:'12px',fontSize:'9px',fontWeight:'600',border:'1px solid #333',background:'#1a1a1a',color:'#888',cursor:'pointer'}}>Clear</button>}
        {allTags.filter(t=>contacts.some(c=>(c.tags||[]).includes(t))).map(t=><button key={t} onClick={()=>setFilterTag(filterTag===t?'':t)} style={{padding:'3px 8px',borderRadius:'12px',fontSize:'9px',fontWeight:'600',cursor:'pointer',border:filterTag===t?'1px solid #c7956d':'1px solid #1e1e1e',background:filterTag===t?'#1a1510':'transparent',color:filterTag===t?'#c7956d':'#444'}}>{t}</button>)}
      </div>}

      {oc>0&&filterCat==='all'&&!search&&!filterTag&&<div style={{background:'linear-gradient(135deg,#1a0808,#120808)',borderRadius:'10px',padding:'10px 14px',marginBottom:'12px',border:'1px solid #2e1010',display:'flex',alignItems:'center',gap:'10px',cursor:'pointer'}} onClick={()=>setView('digest')}><span style={{color:'#ef4444'}}><I.Fire/></span><div><div style={{fontSize:'12px',fontWeight:'600',color:'#ef4444'}}>{oc} overdue</div><div style={{fontSize:'10px',color:'#6a3030'}}>Tap for today's outreach priorities</div></div></div>}

      {filtered.length===0&&<div style={{textAlign:'center',padding:'36px 0',color:'#333'}}><p style={{fontSize:'13px',margin:'0 0 4px',color:'#555'}}>{contacts.length===0?'No contacts yet':'No matches'}</p><p style={{fontSize:'11px',margin:0}}>{contacts.length===0?'Add your first contact or import a CSV':'Try a different search'}</p></div>}

      {filtered.map(c=>{const d=daysSince(c.lastContact);const u=urgency(d,settings.reachOutDays);const cm=catMeta[c.category]||catMeta.personal;const ini=`${(c.firstName||'?')[0]}${(c.lastName||'')[0]||''}`.toUpperCase();
        return <div key={c.id} onClick={()=>{setActive(c);setView('detail')}} style={{display:'flex',alignItems:'center',gap:'11px',padding:'11px 12px',borderRadius:'10px',background:'#0e0e0e',border:'1px solid #161616',marginBottom:'5px',cursor:'pointer',transition:'all 0.12s'}} onMouseEnter={e=>{e.currentTarget.style.background='#131313';e.currentTarget.style.borderColor='#222'}} onMouseLeave={e=>{e.currentTarget.style.background='#0e0e0e';e.currentTarget.style.borderColor='#161616'}}>
          <div style={{width:'38px',height:'38px',borderRadius:'50%',background:'linear-gradient(135deg,#c7956d,#8b6040)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:'700',color:'#0d0d0d',flexShrink:0,fontFamily:"'Cormorant Garamond',serif"}}>{ini}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',alignItems:'center',gap:'6px'}}><span style={{fontSize:'13px',fontWeight:'600',color:'#e8e0d4',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.firstName} {c.lastName}</span><span style={{width:'5px',height:'5px',borderRadius:'50%',background:cm.color,flexShrink:0}}/>{c.category==='dig-the-well'&&<span style={{color:'#d8b4fe',fontSize:'10px'}}><I.Star/></span>}</div>
            <div style={{fontSize:'10px',color:'#555',marginTop:'1px'}}>{c.nickname?'"'+c.nickname+'" · ':''}{u.label}{(c.tags||[]).length>0&&<span style={{color:'#444'}}> · {c.tags[0]}{c.tags.length>1?' +'+(c.tags.length-1):''}</span>}</div>
          </div>
          {d>=settings.reachOutDays&&<div style={{width:'7px',height:'7px',borderRadius:'50%',background:u.fg,flexShrink:0,animation:d>=settings.reachOutDays*1.5?'pulse 2s infinite':'none'}}/>}
        </div>})}
    </div>}

    {view==='add'&&<ContactForm allTags={allTags} customFieldDefs={cfd} onSave={saveContact} onCancel={()=>setView('list')} onAddTag={addTag} onAddField={addField}/>}
    {view==='edit'&&active&&<ContactForm contact={active} allTags={allTags} customFieldDefs={cfd} onSave={saveContact} onCancel={()=>setView('detail')} onAddTag={addTag} onAddField={addField}/>}
    {view==='detail'&&active&&<ContactDetail contact={active} settings={settings} onEdit={c=>{setActive(c);setView('edit')}} onDelete={del} onMarkContacted={markContacted} onBack={()=>{setView('list');setActive(null)}}/>}
    {view==='settings'&&<SettingsPanel settings={settings} onSave={s=>{setSettings(s);setView('list');show('Settings saved')}} onBack={()=>setView('list')} contactCount={contacts.length} onExport={doExport} allTags={allTags} onDeleteTag={deleteTag} customFieldDefs={cfd} onDeleteField={deleteField}/>}
    {view==='digest'&&<React.Fragment><DailyDigest contacts={contacts} settings={settings} onSelect={c=>{setActive(c);setView('detail')}}/><button onClick={()=>setView('list')} style={{...S.ghost,width:'100%',justifyContent:'center',marginTop:'20px'}}><I.Back/> Back to Rolodex</button></React.Fragment>}
    {view==='import'&&<ImportPanel onImport={doImport} onCancel={()=>setView('list')}/>}
    {view==='manage'&&<ManageContacts contacts={contacts} onBatchDelete={batchDelete} onMerge={mergeContacts} onBack={()=>setView('list')}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
